name: Build desktop apps

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build installers
# and attach them to a GitHub Release. `workflow_dispatch` allows a manual run.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build app + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push, attach to that tag's release; on manual runs, use a
          # rolling "nightly" release.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          releaseName: ${{ github.ref_type == 'tag' && format('LogViewer {0}', github.ref_name) || 'LogViewer (nightly)' }}
          releaseBody: "Download the installer for your platform from the assets below."
          releaseDraft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          args: ${{ matrix.args }}
